<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Signup Page Specific Styles */
    .container {
      background: #f0f0f0;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .container h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }
    
    .container label {
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 10px 0;
    }
    
    .container a {
      display: block;
      margin-top: 15px;
      text-align: center;
      color: #4CAF50;
      text-decoration: none;
      font-size: 14px;
    }
    
    .container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <form id="signupForm">
    <h2>Signup</h2>
    <input type="text" id="signupName" placeholder="Name">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password">
    <label>
      <input type="checkbox" onclick="togglePassword('signupPassword')"> Show Password
    </label>
    <p id="signupError" class="error"></p>
    <button type="submit">Signup</button>
    <a href="./login.html">Already have account? Login</a>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
