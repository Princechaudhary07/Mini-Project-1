<body>

<!-- HEADER -->
<div class="top-header">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <div class="header-title" id="pageTitle">Coding Assessment</div>
  <div style="width: 70px;"></div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <div class="header-section">
    <p id="timer">Time Left: 30:00</p>
  </div>

  <div id="questionBox">
    <h3 id="questionTitle">Question Title</h3>
    <p id="questionDesc">Write your problem description here...</p>
  </div>

  <div class="editor-section">
    <label for="language">Select Language:</label>
    <select id="language">
      <option>JavaScript</option>
      <option>Java</option>
      <option>Python</option>
    </select>

    <label for="code">Write Your Code:</label>
    <textarea id="code" rows="15"></textarea>

    <div class="button-group">
      <button onclick="runCode()">Run Code</button>
      <button onclick="submitCode()">Submit</button>
    </div>
  </div>

  <div class="output-section">
    <h3>Output:</h3>
    <pre id="output"></pre>
  </div>

</div>

<!-- SCRIPT -->
<script>
function goBack() {
  window.history.back();
}

function runCode() {
  document.getElementById("output").innerText = "Running code...";
}

function submitCode() {
  document.getElementById("output").innerText = "Code submitted!";
}

// Load and display selected company name
document.addEventListener("DOMContentLoaded", function() {
  let company = localStorage.getItem("company");
  let pageTitle = document.getElementById("pageTitle");
  if (company && pageTitle) {
    pageTitle.innerText = company + " - Coding Assessment";
  }
});
</script>

</body>
