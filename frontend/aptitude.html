<!DOCTYPE html>
<html>
<head>
  <title>Aptitude Test</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /*navbar for back button*/
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 10%;
        padding: 10px 20px;
        z-index: 100;
      }
    /* Aptitude Test Page Specific Styles */
    body.aptitude-page {
      font-family: Arial;
      text-align: center;
      background: #121212;
      color: black;
      margin: 0;
      padding: 0;
    }
    
    .container {
      margin-top: 50px;
      background: transparent;
      border-radius: 0;
      width: auto;
      padding: 20px;
      box-shadow: none;
    }
    
    .container h2 {
      color: black;
      font-size: 24px;
      margin-bottom: 20px;
    }
    
    .container h3 {
      color: black;
      font-size: 16px;
    }
    
    #quizBox {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 8px;
      margin: 20px auto;
      max-width: 600px;
    }
    
    #question {
      color: black;
      font-size: 18px;
      margin-bottom: 20px;
    }
    
    #options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    #options label {
      color: black;
      text-align: left;
      cursor: pointer;
      padding: 10px;
      border: 1px solid #00ff00;
      border-radius: 5px;
      transition: 0.2s;
    }
    
    #options label:hover {
      background: rgba(0, 255, 0, 0.1);
    }
    
    .container button {
      margin-top: 10px;
      padding: 10px 20px;
      background: green;
      color: #121212;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .container button:hover {
      background: #00dd00;
    }
    
    #result {
      color: gray;
      font-size: 20px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Aptitude Test</h2>
  <h3 id="timer">Time: 60</h3>
  <div id="quizBox">
    <h3 id="question"></h3>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
  </div>
  <h2 id="result" style="display:none;"></h2>
</div>
<div class="navbar">
  <button onclick="goBack()">Back</button>
</div>
<script src="script.js"></script>
</body>
</html>
